name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print trusted publishing context
        shell: bash
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "repository=${GITHUB_REPOSITORY}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "workflow=${GITHUB_WORKFLOW}"
          echo "workflow_ref=${GITHUB_WORKFLOW_REF}"
          echo "workflow_sha=${GITHUB_WORKFLOW_SHA}"
          echo "actor=${GITHUB_ACTOR}"

      - name: Print OIDC token claims for npm audience
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('npm:registry.npmjs.org');
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64url').toString('utf8'));

            const keys = [
              'iss',
              'sub',
              'aud',
              'repository',
              'repository_owner',
              'repository_visibility',
              'ref',
              'ref_type',
              'job_workflow_ref',
              'workflow',
              'actor'
            ];

            for (const key of keys) {
              console.log(`${key}=${payload[key] ?? ''}`);
            }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Validate tag and package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Tag version: ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag and package version mismatch."
            exit 1
          fi

      - name: Check if version already exists on npm
        id: version_check
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_NAME}@${PACKAGE_VERSION} is already published. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_NAME}@${PACKAGE_VERSION} is not published yet."
          fi

      - name: Publish to npm with provenance
        if: steps.version_check.outputs.exists == 'false'
        run: npm publish --provenance --access public

      - name: Verify version on npm
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version
